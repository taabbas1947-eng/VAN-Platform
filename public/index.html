<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VAN Control Tower</title>
<style>
  :root{--van:#1f7a43;--van-50:#e8f5ec;--ink:#15301f;--mut:#6b7280;--line:#e3e8e4;--bg:#f4f7f5;--navy:#1f4ba8;--amber:#c4820a}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{display:flex;align-items:center;gap:12px;padding:14px 22px;background:#fff;border-bottom:1px solid var(--line)}
  .mk{width:34px;height:34px;border-radius:9px;background:var(--van);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
  header b{font-size:14px}header span{display:block;font-size:11px;color:var(--mut)}
  .sp{flex:1}
  .who{font-size:12.5px;color:var(--mut);text-align:right}.who b{color:var(--ink);font-size:13px}
  .out{margin-left:14px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer}
  .wrap{max-width:980px;margin:0 auto;padding:26px 22px}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--mut);font-size:13px;margin:0 0 22px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .tile{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;min-height:140px;transition:.15s}
  .tile.open{cursor:pointer}.tile.open:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(20,48,31,.08);border-color:#bfe0c9}
  .tile.faded{opacity:.55}
  .ic{width:40px;height:40px;border-radius:11px;background:var(--van-50);color:var(--van);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px}
  .tile h3{font-size:15px;margin:12px 0 4px}.tile p{font-size:12.5px;color:var(--mut);margin:0;flex:1}
  .row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  .badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px}
  .b-live{background:var(--van-50);color:var(--van)}.b-beta{background:#fef3df;color:var(--amber)}.b-planned{background:#eef1f5;color:var(--mut)}
  .go{font-size:12.5px;font-weight:700;color:var(--van)}
</style>
</head>
<body>
  <header>
    <div class="mk">V</div>
    <div><b>VAN Control Tower</b><span>Vital Agri Nutrients</span></div>
    <div class="sp"></div>
    <div class="who" id="who"></div>
    <button class="out" onclick="logout()">Sign out</button>
  </header>
  <div class="wrap">
    <h1 id="greet">Welcome</h1>
    <p class="sub">Your applications — bright tiles are open to you; faded tiles are coming soon.</p>
    <div class="grid" id="grid"></div>
  </div>
<script>
  let ME = null;
  const BADGE = { live: 'b-live', beta: 'b-beta', planned: 'b-planned' };
  function open(a){ if(!a.open) return; if(a.href.startsWith('http')) window.open(a.href,'_blank','noopener'); else location.href=a.href; }
  async function load(){
    const r = await fetch('/api/me');
    if(!r.ok){ location.href='/login'; return; }
    ME = await r.json();
    document.getElementById('who').innerHTML = '<b>'+ME.user.name+'</b><br>'+ME.user.role;
    const h = new Date().getHours();
    document.getElementById('greet').textContent = (h<12?'Good morning':h<17?'Good afternoon':'Good evening')+', '+ME.user.name.split(' ')[0];
    document.getElementById('grid').innerHTML = ME.apps.map((a,i)=>{
      const cls = a.open ? 'open' : 'faded';
      const act = a.status==='planned' ? '<span class="go" style="color:var(--mut)">Coming soon</span>'
        : a.open ? '<span class="go">Open →</span>' : '<span class="go" style="color:var(--mut)">No access</span>';
      return '<div class="tile '+cls+'" onclick="open(ME.apps['+i+'])">'
        +'<div class="ic">'+a.name[0]+'</div>'
        +'<h3>'+a.name+'</h3><p>'+a.desc+'</p>'
        +'<div class="row"><span class="badge '+BADGE[a.status]+'">'+a.status.toUpperCase()+'</span>'+act+'</div></div>';
    }).join('');
  }
  async function logout(){ await fetch('/api/logout',{method:'POST'}); location.href='/login'; }
  load();
</script>
</body>
</html>
